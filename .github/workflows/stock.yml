name: stock
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3332 }
          - { version: 1583 }
          - { version: 937 }
          - { version: 8701 }
          - { version: 549 }
          - { version: 8351 }
          - { version: 7369 }
